<div class="z-10 w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">

<p class="font-headline text-xl md:text-2xl text-on-surface-variant font-light max-w-md">

</div>

<div class="glass-panel ambient-shadow p-8 md:p-12 rounded-[2rem] w-full max-w-[520px] space-y-10">
<!-- Role Selector -->
<div class="space-y-4">
<p class="text-sm font-label uppercase tracking-widest text-on-surface-variant/70 font-semibold">Identify your role</p>
<div class="grid grid-cols-3 gap-4">
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-lowest border-2 border-primary/20 hover:border-primary transition-all group">

<span class="text-xs font-bold text-on-surface">Doctor</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low hover:bg-white transition-all group">
<span class="material-symbols-outlined text-secondary mb-2 text-3xl group-hover:scale-110 transition-transform" data-icon="person">person</span>
<span class="text-xs font-bold text-on-surface">Patient</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-surface-container-low hover:bg-white transition-all group">
<span class="material-symbols-outlined text-secondary mb-2 text-3xl group-hover:scale-110 transition-transform" data-icon="admin_panel_settings">admin_panel_settings</span>
<span class="text-xs font-bold text-on-surface">Admin</span>
</button>
</div>

<!-- Login Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface ml-1">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none text-on-surface placeholder:text-outline-variant" placeholder="practitioner@serene.clinic" type="email"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-semibold text-on-surface">Security Key</label>
<a class="text-xs text-primary font-medium hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
</div>
</div>
<div class="flex items-center space-x-2 px-1">
<input class="w-4 h-4 rounded text-primary border-outline-variant focus:ring-primary/30" id="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant" for="remember">Keep me signed in for 30 days</label>
</div>
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-dim text-on-primary rounded-xl font-bold text-lg ambient-shadow hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                            Enter Sanctuary
                        </button>
</form>
<!-- Footer Options -->
<div class="text-center space-y-4">
<div class="flex items-center space-x-4 text-outline-variant">
<div class="h-[1px] bg-outline-variant/30 flex-grow"></div>
<span class="text-xs uppercase tracking-widest font-semibold">Access with Biometrics</span>
<div class="h-[1px] bg-outline-variant/30 flex-grow"></div>
</div>
<div class="flex justify-center space-x-6">
<button class="p-3 bg-surface-container-low rounded-full hover:bg-primary-container/30 transition-colors">
